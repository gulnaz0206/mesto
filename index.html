<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Место</title>
    <link rel="stylesheet" href="./pages/index.css">
</head>

<body class="page">
    <header class="header">
        <img src="./images/logo.svg" alt="Логотип" class="header__logo">
    </header>
    <main class="content">
        <section class="profile">
            <img src="./images/kusto.jpg" alt="Кусто" class="profile__avatar">
            <div class="profile__info">
                <h1 class="profile__name">Жак-Ив Кусто</h1>
                <button type="button" aria-label="Кнопка" class="profile__edit">
                </button>
                <p class="profile__job">Исследователь океана</p>
            </div>
            <button type="button" aria-label="Кнопка плюс" class="profile__button"></button>
        </section>
        <section class="elements"></section>
    </main>
    <footer class="footer">
        <p class="footer__copy">&copy;&nbsp;2022 Mesto Russia</p>
    </footer>

    <!-- Место для попапа -->
    <!-- Попап редактирования профиля -->
    <div class="popup popup__edit_profile">
        <div class="popup__container">
            <button type="button" aria-label="Кнопка закрыть попап" class="popup__close-button"></button>
            <h3 class="popup__title">Редактировать профиль</h3>
            <form name="edit-form" class="popup__edit_form">
                <input type="text" name="popup__name" placeholder="Ваше имя"
                    class="popup__input popup__input_type_name">
                <input type="text" name="popup__job" placeholder="Ваша профессия"
                    class="popup__input popup__input_type_job">
                <button type="submit" class="popup__submit-button">Сохранить</button>
            </form>
        </div>
    </div>
    <!-- Попап добавления карточки -->
    <div class="popup popup__create_card">
        <div class="popup__container">
            <button type="button" aria-label="Кнопка закрыть попап" class="popup__close-button"></button>
            <h3 class="popup__title">Новое место</h3>
            <form name="add-form" class="popup__add_form">
                <input type="text" name="popup__name" placeholder="Название"
                    class="popup__input popup__input_type_place">
                <input type="text" name="popup__job" placeholder="Ссылка на картинку"
                    class="popup__input popup__input_type_link">
                <button type="submit" class="popup__create-button">Создать</button>
            </form>
        </div>
    </div>
    <!-- Попап большой картинки-->
    <div id="popup-big-picture" class="popup popup__big_picture">
        <div class="popup__image_container">
            <button type="button" aria-label="Кнопка закрыть попап" class="popup__close-button"></button>
            <img class="popup__image" alt=" ">
            <figcaption class="popup__image_heading"></figcaption>
        </div>
    </div>

    <!-- Темплейт-->
    <template class="card__template">
        <article class="element">
            <button type="button" aria-label="Кнопка удалить" class="element__delete-button"></button>
            <img class="element__image" src="#" alt="#">
            <div class="element__vector-like">
                <h2 class="element__caption"></h2>
                <button type="button" aria-label="Кнопка лайк" class="element__like"></button>
            </div>
        </article>
    </template>

    <script type="module" src="./scripts/index.js"></script>

</body>

</html>
