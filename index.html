<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Место</title>
    <link rel="stylesheet" href="./pages/index.css">
</head>

<body class="page">
    <header class="header">
        <img src="./images/logo.svg" alt="Логотип" class="header__logo">
    </header>
    <main class="content">
        <section class="profile">
            <img src="./images/kusto.jpg" alt="Кусто" class="profile__avatar">
            <div class="profile__info">
                <h1 class="profile__name">Жак-Ив Кусто</h1>
                <button type="button" aria-label="Кнопка" class="profile__edit">
                </button>
                <p class="profile__job">Исследователь океана</p>
            </div>
        <button type="button" aria-label="Кнопка плюс" class="profile__button"></button>
        </section>
        <section class="elements">
            <article class="element">
                <img src="./images/karachaevsk.jpg" alt="Карачаево-Черкессия" class="element__image">
                <div class="element__vector-like">
                    <h2 class="element__caption">Карачаевск</h2><button type="button" aria-label="Кнопка лайк"
                        class="element__like"></button>
                </div>
            </article>
            <article class="element">
                <img src="./images/elbrus.png" alt="Эльбрус" class="element__image">
                <div class="element__vector-like">
                    <h2 class="element__caption">Гора Эльбрус</h2><button type="button" aria-label="Кнопка лайк"
                        class="element__like"></button>
                </div>
            </article>
            <article class="element">
                <img src="./images/dombai.png" alt="Домбай" class="element__image">
                <div class="element__vector-like">
                    <h2 class="element__caption">Домбай</h2><button type="button" aria-label="Кнопка лайк"
                        class="element__like"></button>
                </div>
            </article>
            <article class="element">
                <img src="./images/elbrus.png" alt="Эльбрус" class="element__image">
                <div class="element__vector-like">
                    <h2 class="element__caption">Гора Эльбрус</h2><button type="button" aria-label="Кнопка лайк"
                        class="element__like"></button>
                </div>
            </article>
            <article class="element">
                <img src="./images/dombai.png" alt="Домбай" class="element__image">
                <div class="element__vector-like">
                    <h2 class="element__caption">Домбай</h2><button type="button" aria-label="Кнопка лайк"
                        class="element__like"></button>
                </div>
            </article>
            <article class="element">
                <img src="./images/karachaevsk.jpg" alt="Карачаево-Черкессия" class="element__image">
                <div class="element__vector-like">
                    <h2 class="element__caption">Карачаево-Черкессия</h2><button type="button"
                        aria-label="Кнопка лайк" class="element__like"></button>
                </div>
            </article>
        </section>
    </main>
    <footer class="footer">
        <p class="footer__copy">&copy;&nbsp;2022 Mesto Russia</p>
    </footer>

    <!-- Место для попапа -->
    <div class="popup popup_opened">
        <div class="popup__container">
            <button type="button" aria-label="Кнопка закрыть попап" class="popup__close-button"></button>
            <h3 class="popup__title">Редактировать профиль</h3>
            <form name="edit-form" class="popup__form">
                <input type="text" name="popup__name" placeholder="Ваше имя" class="popup__input popup__input_type_name">
                <input type="text" name="popup__job" placeholder="Ваша профессия" class="popup__input popup__input_type_job">
                <button type="submit" class="popup__submit-button">Сохранить</button>
            </form>
        </div>

    </div>
    <script src="./scripts/index.js"></script>

</body>

</html>
