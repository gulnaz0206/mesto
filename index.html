<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Место</title>
    <link rel="stylesheet" href="./pages/index.css">
</head>

<body class="page">
    <header class="header">
        <img src="./images/logo.png" alt="Логотип" class="header__logo">
    </header>
    <main class="content">
        <section class="profile">
            <img src="./images/kusto.jpg" alt="Кусто" class="profile__avatar">
            <div class="profile__info">
                <h1 class="profile__name">Жак-Ив Кусто</h1>
                <button class="profile__edit">
                </button>
                <p class="profile__job">Исследователь океана</p>
            </div>
            <button class="profile__button"><img src="./images/plus.png" alt="Плюс"></button>
        </section>
        <section class="elements">
            <figure class="element">
                <img src="./images/karachaevsk.jpg" alt="Карачаево-Черкессия" class="element__image">
                <figcaption class="element__vector-like">
                    <p class="element__caption">Карачаевск</p><button class="element__like"></button>
                </figcaption>
            </figure>
            <figure class="element">
                <img src="./images/elbrus.png" alt="Эльбрус" class="element__image">
                <figcaption class="element__vector-like">
                    <p class="element__caption">Гора Эльбрус</p><button class="element__like"></button>
                </figcaption>
            </figure>
            <figure class="element">
                <img src="./images/dombai.png" alt="Домбай" class="element__image">
                <figcaption class="element__vector-like">
                    <p class="element__caption">Домбай</p><button class="element__like"></button>
                </figcaption>
            </figure>
            <figure class="element">
                <img src="./images/elbrus.png" alt="Эльбрус" class="element__image">
                <figcaption class="element__vector-like">
                    <p class="element__caption">Гора Эльбрус</p><button class="element__like"></button>
                </figcaption>
            </figure>
            <figure class="element">
                <img src="./images/dombai.png" alt="Домбай" class="element__image">
                <figcaption class="element__vector-like">
                    <p class="element__caption">Домбай</p><button class="element__like"></button>
                </figcaption>
            </figure>
            <figure class="element">
                <img src="./images/karachaevsk.jpg" alt="Карачаево-Черкессия" class="element__image">
                <figcaption class="element__vector-like">
                    <p class="element__caption">Карачаево-Черкессия</p><button class="element__like"></button>
                </figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p class="footer">&copy;&nbsp;2022 Mesto Russia</p>
    </footer>

    <!-- Место для попапа -->
    <div class="popup popup_opened">
        <section class="popup__container">
            <button type="button" class="popup__close"></button>
            <h3 class="popup__title">Редактировать профиль</h3>
            <div class="popup__input">
                <input type="text" name="popup__name" placeholder="Жак-Ив Кусто" class="popup__name">
                <input type="text" name="popup__job" placeholder="Исследователь океана" class="popup__job">
            </div>
            <button type="submit" class="popup__submit">Сохранить</button>
        </section>

    </div>
    <script src="./scripts/index.js"></script>

</body>

</html>
